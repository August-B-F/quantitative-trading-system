# LIVE WIRING (2026-07-02) — operator action; this file itself is never edited
# to go live. scripts/run_rebalance.py routes any configs/accounts.yaml
# strategy entry carrying `engine: rotation` through the tranched rotation
# compute path:
#   - signals: strategy.rotation.blend_rotation_weights on data/clean/prices
#     parquets (universe above + SPY), guarded by the same 3-trading-day
#     freshness gate as the panel path (stale prices -> exit 2, no trade);
#   - rebalance days: month-end + rebalance.tranches offsets above
#     (+0/+5/+10/+15 NYSE trading days); the day determines WHICH tranche
#     updates, each tranche = 1/4 of account equity;
#   - tranche state: logs/tranche_state.json, keyed by the accounts.yaml slug,
#     written atomically; missing tranches default to 100% SHY;
#   - the account-level target (equal-weight average of the 4 tranches) feeds
#     the existing StrategyExecutor unchanged.
#
# Exact accounts.yaml entry shape (add under `strategies:`):
#
#   candidate_blend_rotation:            # slug — also the tranche-state key
#     name: BLEND_ROTATION
#     slot: 10                           # slots 1-9 are taken by the classic book
#     tier: candidate                    # report grouping ("CANDIDATE TIER")
#     login: <alpaca login owning the paper account>
#     alpaca_key_env: ALPACA_S10_KEY     # API key env var, set in .env
#     alpaca_secret_env: ALPACA_S10_SECRET
#     config: configs/strategies/candidate_blend_rotation.yaml
#     engine: rotation                   # REQUIRED — routes to the rotation path;
#                                        # omitted = classic StrategyRunner path
#
# Notes: logs/monthly_comparison.csv records slots 1-9 only (slot 10 equity is
# in logs/rebalance_log.json); the daily scheduler must invoke run_rebalance on
# every trading day (it already exits 0 on non-decision days) so the +5/+10/+15
# tranche days actually fire. Until the operator adds the entry above, this
