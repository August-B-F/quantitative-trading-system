training:
  batch_size: 128
  num_epochs: 50
  lr: 0.0005
  weight_decay: 0.0001
  early_stopping_patience: 8
  grad_clip: 1.0
  label_smoothing: 0.05
  class_weights: true

walk_forward:
  enabled: true
  train_months: 18
  val_months: 3
  test_months: 1
  step_months: 1
  min_windows: 6
  promote_metric: "sharpe"      # metric used to decide if new model beats old
  promote_threshold: 0.05       # new model must beat old by this much

hyperparam_search:
  enabled: true
  n_trials: 80
  sampler: "tpe"                # tree-structured parzen estimator (Optuna)
  pruner: "median"
  search_space:
    lr: [0.0001, 0.005]
    hidden_dim: [64, 256]
    num_layers: [1, 3]
    dropout: [0.1, 0.5]
    price_window: [20, 60]
    r_hi: [0.01, 0.06]
    r_lo: [0.002, 0.015]
    mc_dropout_samples: [20, 100]
