training:
  batch_size: 256
  num_epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 8
  grad_clip: 1.0
  label_smoothing: 0.05

walk_forward:
  enabled: true
  train_months: 18
  val_months: 3
  test_months: 1
  step_months: 1
  min_windows: 3

hyperparam_search:
  enabled: true
  n_trials: 60
  direction: "maximize"   # maximize walk-forward Sharpe
  search_space:
    lr: [0.00005, 0.005]
    dropout: [0.1, 0.5]
    price_hidden: [64, 256]
    sentiment_hidden: [32, 128]
    fusion_hidden: [128, 512]
    price_window: [20, 60]
    sentiment_window: [10, 40]
    r_hi: [0.015, 0.06]
    r_lo: [0.002, 0.015]
    kelly_fraction: [0.1, 0.5]
    confidence_threshold: [0.45, 0.75]
    max_single_position: [0.05, 0.25]

augmentation:
  enabled: true
  gaussian_noise_std: 0.005
  time_shift_max: 2
