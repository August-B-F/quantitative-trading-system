training:
  batch_size: 512                  # RTX 4060 Ti 16GB — was 256
  num_epochs: 50
  epochs: 50
  lr: 0.0003
  learning_rate: 0.0003
  weight_decay: 0.0001
  lr_scheduler: "cosine"           # cosine annealing
  early_stopping_patience: 8
  grad_clip: 1.0
  class_weights: true              # handle class imbalance
  device: "auto"                   # auto = cuda if available else cpu
  n_folds: 4
  val_window_days: 120

walk_forward:
  enabled: true
  train_months: 18
  val_months: 3
  test_months: 1
  step_months: 1
  min_windows: 6                   # minimum walk-forward windows required

hyperparam_search:
  enabled: true
  n_trials: 80
  metric: "sharpe"                 # optimise sharpe on val set
  search_space:
    lr: [0.00005, 0.005]
    hidden_dim: [128, 256]
    num_transformer_layers: [2, 6]
    dropout: [0.1, 0.4]
    price_window: [20, 60]
    r_hi: [0.015, 0.05]
    kelly_fraction: [0.1, 0.5]
    min_confidence: [0.50, 0.80]
    stop_loss: [0.05, 0.25]
    take_profit: [0.05, 0.30]
    max_single_position: [0.05, 0.20]

augmentation:
  enabled: true
  gaussian_noise_std: 0.005        # small noise on price features
  time_warp: true
  mixup_alpha: 0.2
