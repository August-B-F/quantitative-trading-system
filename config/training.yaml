training:
  batch_size: 128
  num_epochs: 40
  lr: 0.0005
  weight_decay: 0.0001
  lr_scheduler: "cosine"        # cosine annealing
  gradient_clip: 1.0
  early_stopping_patience: 7
  class_weights: true           # weight loss by class frequency
  device: "auto"                # auto-detect cuda/mps/cpu

walk_forward:
  enabled: true
  train_months: 18
  val_months: 3
  test_months: 1
  step_months: 1
  min_windows: 6                # minimum WF windows to average over

hyperparam_search:
  enabled: true
  n_trials: 80
  sampler: "tpe"                # Tree-structured Parzen Estimator (Optuna)
  objective: "sharpe"           # maximize walk-forward Sharpe
  search_space:
    lr: [0.00005, 0.005]
    dropout: [0.1, 0.5]
    hidden_dim: [64, 256]
    price_window: [20, 60]
    r_hi: [0.01, 0.05]
    r_lo: [0.002, 0.015]
    kelly_fraction: [0.1, 0.5]
    confidence_threshold: [0.4, 0.9]
    diversification: [3, 15]
