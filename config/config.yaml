alpaca:
  key_id: "YOUR_ALPACA_KEY"
  secret_key: "YOUR_ALPACA_SECRET"
  base_url: "https://paper-api.alpaca.markets"
  data_base_url: "https://data.alpaca.markets"

universe:
  symbols:
    - AAPL
    - MSFT
    - AMZN
    - GOOGL
    - META
    - NVDA
    - TSLA
    - JPM
    - V
    - UNH
    - XOM
    - LLY
    - AVGO
    - JNJ
    - WMT
    - MA
    - PG
    - HD
    - MRK
    - COST
    - ORCL
    - CVX
    - BAC
    - ABBV
    - KO
    - PEP
    - ADBE
    - CSCO
    - AMD
    - NFLX
    - CRM
    - TMO
    - MCD
    - QCOM
    - INTC
    - DIS
    - ABT
    - INTU
    - TXN
    - GE
    - AMGN
    - HON
    - SPGI
    - LOW
    - GS
    - IBM
    - CAT
    - AXP
    - MS
    - BLK
  benchmark: "SPY"
  sector_etfs:
    - "XLK"
    - "XLF"
    - "XLE"
    - "XLY"
    - "XLV"
    - "XLI"
    - "XLP"
    - "XLB"
    - "XLRE"
    - "XLU"

data:
  start_date: "2018-01-01"
  end_date: null
  bar_timeframe: "1Day"
  timezone: "America/New_York"

news:
  enabled: true
  max_articles_per_symbol_per_day: 20
  lookback_days: 365

macro:
  enabled: true
  symbols:
    - "VIXY"    # VIX proxy ETF
    - "TLT"     # 20yr treasury
    - "SHY"     # 1-3yr treasury (spread = TLT-SHY)
    - "GLD"     # gold
    - "USO"     # crude oil
    - "DXY"     # USD index via UUP
    - "UUP"     # USD bullish ETF

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  scalers_dir: "data/scalers"
  logs_dir: "data/logs"
  db_path: "data/performance.db"

trading:
  live: false
  run_time: "15:45"
  max_gross_exposure: 0.95
  max_single_position: 0.15
  min_cash_buffer: 0.05
  allow_short: false           # set true when ready
  kelly_fraction: 0.25         # fractional Kelly multiplier
  server_side_orders: true     # use bracket orders on Alpaca
