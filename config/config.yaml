alpaca:
  key_id: "${ALPACA_KEY}"
  secret_key: "${ALPACA_SECRET}"
  base_url: "https://paper-api.alpaca.markets"
  data_base_url: "https://data.alpaca.markets"

universe:
  symbols:
    - AAPL
    - MSFT
    - AMZN
    - GOOGL
    - META
    - NVDA
    - TSLA
    - JPM
    - BAC
    - GS
    - XOM
    - CVX
    - JNJ
    - UNH
    - PFE
    - ABBV
    - HD
    - MCD
    - NKE
    - DIS
    - NFLX
    - ADBE
    - CRM
    - AMD
    - INTC
    - QCOM
    - TXN
    - AVGO
    - MU
    - AMAT
    - BA
    - CAT
    - GE
    - MMM
    - LMT
    - KO
    - PEP
    - WMT
    - COST
    - TGT
    - AMGN
    - GILD
    - MRNA
    - BRK.B
    - V
    - MA
    - PYPL
    - SQ
    - COIN
    - HOOD
  benchmark: "SPY"
  sector_etfs:
    - XLK
    - XLF
    - XLE
    - XLY
    - XLV
    - XLI
    - XLB
    - XLRE
    - XLP
    - XLU
  vix_symbol: "VIXY"

data:
  start_date: "2018-01-01"
  end_date: null
  bar_timeframe: "1Day"
  timezone: "America/New_York"

news:
  enabled: true
  max_articles_per_day: 30
  lookback_days: 730

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  scalers_dir: "data/scalers"
  logs_dir: "data/logs"
  db_path: "data/performance.db"

trading:
  live: false
  run_time: "15:45"
  max_gross_exposure: 0.95
  max_single_position: 0.15
  min_cash_buffer: 0.05
  allow_short: true
  max_short_exposure: 0.3
  kelly_fraction: 0.3
  bracket_orders: true
