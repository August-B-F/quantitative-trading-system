model:
  type: "lstm_transformer"         # lstm_transformer | lstm_only | transformer_only
  price_window: 40                  # days of price/technical history fed to model
  sentiment_window: 20              # days of sentiment history
  macro_window: 20                  # days of macro/sector history
  hidden_dim: 128                   # LSTM / attention hidden size
  num_lstm_layers: 2
  num_attention_heads: 4
  dropout: 0.3                      # must be >0 for MC-Dropout to work
  company_embedding_dim: 16         # learned per-ticker embedding
  macro_hidden_dim: 64
  fc_dims: [256, 128]               # fully-connected head dims
  num_classes: 5                    # strong_sell / sell / hold / buy / strong_buy

targets:
  horizon_days: 3                   # predict return over next N days
  r_hi: 0.025                       # threshold for strong buy/sell label
  r_lo: 0.008                       # threshold for hold

uncertainty:
  mc_dropout_samples: 50            # MC-Dropout forward passes at inference
