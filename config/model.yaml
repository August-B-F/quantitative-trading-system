model:
  type: "multi_branch"          # multi-input LSTM + Transformer + MLP
  price_window: 40              # days of price/technical history
  sentiment_window: 20          # days of sentiment history
  macro_window: 20              # days of macro/index history
  hidden_dim: 128
  num_lstm_layers: 2
  num_transformer_heads: 4
  num_transformer_layers: 2
  dropout: 0.3                  # used for MC Dropout at inference too
  company_embedding_dim: 16
  sector_embedding_dim: 8
  macro_hidden_dim: 64
  mlp_hidden_dims: [256, 128, 64]

targets:
  horizon_days: 3               # predict N-day forward return
  r_hi: 0.03                    # threshold for strong buy/sell label
  r_lo: 0.008                   # threshold for weak buy/sell label
  num_classes: 5                # strong sell, sell, hold, buy, strong buy

uncertainty:
  mc_dropout_samples: 50        # number of stochastic forward passes
