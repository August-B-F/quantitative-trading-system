model:
  type: "lstm_transformer"
  price_window: 40
  sentiment_window: 20
  macro_window: 20
  hidden_dim: 128
  num_layers: 2
  num_attention_heads: 4
  dropout: 0.3
  company_embedding_dim: 16
  sector_embedding_dim: 8
  macro_hidden_dim: 64
  fusion_hidden_dim: 256

targets:
  horizon_days: 3
  r_hi: 0.03
  r_lo: 0.005
  # Labels: 4=strong_buy, 3=weak_buy, 2=hold, 1=weak_sell, 0=strong_sell

uncertainty:
  mc_dropout_samples: 50
  min_confidence: 0.55
